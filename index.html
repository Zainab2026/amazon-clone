<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Comicos</title>
</head>
<body>
    <header>
        <h1>Welcome to Comicos</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">About Comics</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="carousel">
            <h2>Featured Comics</h2>
            <div class="carousel-content">
                <!-- Carousel images for featured comics -->
            </div>
        </section>
        <section id="product-list">
            <h2>Fresh Comics</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="https://example.com/comic1.jpg" alt="Comic 1" class="product-image">
                    <h3 class="product-title">Comic 1</h3>
                    <p class="product-description">A brief description of Comic 1.</p>
                </div>
                <div class="product-card">
                    <img src="https://example.com/comic2.jpg" alt="Comic 2" class="product-image">
                    <h3 class="product-title">Comic 2</h3>
                    <p class="product-description">A brief description of Comic 2.</p>
                </div>
                <!-- Add more comic cards as needed -->
            </div>
        </section>
        <section id="categories">
            <h2>Categories</h2>
            <div class="category-list">
                <div class="category-item">Superheroes</div>
                <div class="category-item">Manga</div>
                <div class="category-item">Graphic Novels</div>
                <!-- Add more categories as needed -->
            </div>
        </section>
        <button id="clear-cart" onclick="clearCart()">Clear Cart</button>
    </main>
    <footer>
        <p>&copy; 2023 Comicos</p>
        <p><a href="#">About Us</a> | <a href="#">Contact</a></p>
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
